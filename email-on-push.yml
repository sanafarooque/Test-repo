name: Email Notification on Push

on:
  push:
    branches:
      - main  # Change this to your branch if needed

jobs:
  send_email:
    runs-on: ubuntu-latest

    steps:
      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "🚀 New code pushed to ${{ github.repository }}"
          to: sanafarooque26@gmail.com
          from: GitHub Bot <your-email@example.com>
          body: |
            A new push was made to the main branch of the repository: ${{ github.repository }}

            ➤ Commit by: ${{ github.event.head_commit.author.name }}
            ➤ Commit message: ${{ github.event.head_commit.message }}
            ➤ Commit URL: ${{ github.event.head_commit.url }}


