name: Notify on merge

on:
  push:
    branches:
      - main
      - master
      - '**'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Notification
        if: github.event.head_commit.message != ''
        run: echo "Merge occurred on branch ${{ github.ref }} by ${{ github.actor }}"