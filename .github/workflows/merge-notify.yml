name: Send Email Notification

on:
  pull_request:
    types: [closed]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Email Notification
        if: github.event.pull_request.merged == true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: mail.hpe.com
          server_port: 587
          username: ${{ SMTP_SANAFAROOQUE }}
          password: ${{ no-reply@hpe.com }}
          subject: "Branch Merge Notification"
          to: sana.farooque@hpe.com
          from: no-reply@hpe.com
          body: "Branch '${{ github.event.pull_request.head.ref }}' was merged into '${{ github.event.pull_request.base.ref }}' by ${{ github.actor }}"