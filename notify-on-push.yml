name: Notify Slack on Push

on:
  push:
    branches:
      - main  # Change this to your target branch

jobs:
  slackNotification:
    runs-on: ubuntu-latest

    steps:
      - name: Send Slack message
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": ":rocket: *New code pushed to* `${{ github.repository }}` *by* `${{ github.actor }}`\n> *Commit:* `${{ github.event.head_commit.message }}`\n🔗 <${{ github.event.head_commit.url }}|View Commit>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

